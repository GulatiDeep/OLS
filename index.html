
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICAO Annex-14 OLS Surface Visualiser</title>
  <style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050505;
    color: #fff;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #layer-toggle-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 52px;
    height: 52px;
    background: rgba(40, 44, 52, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 110;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: all 0.2s;
    width: 52px;
    height: 52px;
  }

  #layer-toggle-btn:hover {
    background: rgba(60, 64, 72, 0.9);
    border-color: #00d4ff;
  }

  #layer-panel {
    position: absolute;
    top: 75px;
    left: 20px;
    width: 280px;
    background: rgba(15, 15, 15, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 15px;
    z-index: 105;
    backdrop-filter: blur(10px);
    display: none;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideIn 0.2s ease-out;
  }

  #zoom-cycle-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 52px;
    height: 52px;
    background: rgba(40, 44, 52, 0.9);
    border: 2px solid #00d4ff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 110;
    box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
    transition: all 0.2s;
    user-select: none;
  }
  /* Mobile Optimization */
  @media (max-width: 768px) {

    #main-title {
      font-size: 14px;
      top: 10px;
      padding: 0 10px;
    }

    #layer-panel {
      width: calc(100% - 20px);
      left: 10px;
      top: 70px;
      max-height: 70vh;
    }

    .toggle-row {
      font-size: 15px;
      padding: 10px;
    }

    .opacity-slider {
      height: 8px;
    }

    #status-bar {
      font-size: 11px;
      height: 24px;
      padding: 0 15px;
    }

    #layer-toggle-btn,
    #zoom-cycle-btn {
      width: 50px;
      height: 50px;
    }
  }

  #zoom-cycle-btn:hover {
    background: #00d4ff;
    transform: scale(1.08);
  }

  #compass {
    position: absolute;
    top: 80px;
    right: 20px;
    width: 70px;
    height: 70px;
    z-index: 110;
  }

  #compass-rose {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(20,20,20,0.9);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
  }

  .dir {
    position: absolute;
    font-size: 10px;
    color: #00d4ff;
    font-weight: bold;
  }

  .dir.n { top: 4px; left: 50%; transform: translateX(-50%); }
  .dir.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .dir.e { right: 4px; top: 50%; transform: translateY(-50%); }
  .dir.w { left: 4px; top: 50%; transform: translateY(-50%); }

  #compass-arrow {
    position: absolute;
    width: 2px;
    height: 26px;
    background: #00d4ff;
    top: 10px;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%);
  }

  #zoom-value-text {
    font-size: 13px;
    font-weight: 800;
    color: #fff;
  }

  #zoom-cycle-btn:hover #zoom-value-text {
    color: #000;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h2 {
    margin: 0 0 12px 0;
    font-size: 14px;
    color: #00d4ff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .layer-group {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #eee;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    padding: 6px 8px;
    transition: background 0.2s;
  }

  .toggle-row:hover {
    background: rgba(0,212,255,0.08);
  }

  .toggle-row label {
    display: flex;
    align-items: center;
    cursor: pointer;
    flex-grow: 1;
    font-weight: 500;
  }

  .toggle-row span {
    font-weight: bold;
    font-size: 14px;
    color: #00d4ff;
  }

  .toggle-row input[type="checkbox"] {
    margin-right: 10px;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  /* Color-coded checkboxes (acts as legend) */
  #chkIHS { accent-color: #00ffff; }
  #chkConical { accent-color: #ffa500; }
  #chkOHS { accent-color: #9933ff; }

  #chkAppr1, #chkAppr2 { accent-color: #00ff00; }          /* neon green */
  #chkTakeOff1, #chkTakeOff2 { accent-color: #ff00ff; }    /* magenta */
  #chkTrans09, #chkTrans27 { accent-color: #0077ff; }      /* deep blue */

  #chkInnerAppr1, #chkInnerAppr2 { accent-color: #00ffff; } /* cyan */
  #chkBLS1, #chkBLS2 { accent-color: #ff0000; }            /* red */
  #chkITS1, #chkITS2 { accent-color: #ffff00; }            /* bright yellow */

  /* Group checkboxes (neutral color) */
  #chkCommon, #chkRwy09, #chkRwy27, #chkOFZ09, #chkOFZ27 {
    accent-color: #00d4ff;
  }

  .opacity-container {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.25);
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .opacity-slider {
    flex-grow: 1;
    height: 5px;
    border-radius: 2px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(90deg, #00d4ff, #0077ff);
    outline: none;
    cursor: pointer;
  }

  .opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #00d4ff;
    border-radius: 50%;
    cursor: pointer;
  }

  .opacity-slider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #00d4ff;
    border-radius: 50%;
    cursor: pointer;
  }

  .opacity-value {
    color: #00d4ff;
    font-weight: bold;
    font-size: 12px;
    width: 35px;
    text-align: right;
    font-family: monospace;
  }

  .section-header {
    font-weight: bold;
    font-size: 11px;
    color: #00d4ff;
    margin-bottom: 8px;
    display: block;
    letter-spacing: 0.5px;
  }

  h2 {
    margin: 0 0 12px 0;
    font-size: 14px;
    color: #00d4ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(0,212,255,0.2);
    padding-bottom: 6px;
  }


  /* Center Heading */
  #main-title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 1px;
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }

  /* Status Bar */
  #status-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 28px;
    background: rgba(20, 20, 20, 0.95);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 15px;
    font-size: 12px;
    color: #aaa;
    z-index: 100;
    box-sizing: border-box;
    overflow: hidden;
    white-space: nowrap;
  }
  </style>
</head>
<body>
  <div id="main-title">ICAO Annex-14 OLS Surface Visualiser</div>

  <div id="zoom-cycle-btn" onclick="cycleVScale()" title="Toggle Vertical Scaling">
    <span id="zoom-value-text">4x</span>
  </div>

  <div id="compass">
    <div id="compass-rose">
      <div class="dir n">N</div>
      <div class="dir e">E</div>
      <div class="dir s">S</div>
      <div class="dir w">W</div>
      <div id="compass-arrow"></div>
    </div>
  </div>

  <div id="layer-toggle-btn" onclick="toggleLayerUI()" title="Toggle Layers">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M12,16L19.36,10.27L21,9L12,2L3,9L4.63,10.27M12,18.54L4.62,12.81L3,14.07L12,21.07L21,14.07L19.37,12.81L12,18.54Z" /></svg>
  </div>
  
  <div id="layer-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:10px;">
      <h2 style="margin:0;">OLS Layers</h2>
      <button onclick="resetAllControls()" style="background:#00d4ff; color:#000; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold; white-space:nowrap;">
        Reset
      </button>
    </div>

    <!-- COMMON SURFACES -->
    <div class="layer-group">
      <div class="toggle-row" onclick="toggleSectionWithIcon('commonGroup', this.querySelector('span'), event)">
        <label style="cursor:pointer;">
          <input type="checkbox" id="chkCommon" checked onchange="toggleCommonGroup()"> Common Surfaces
        </label>
        <span style="cursor:pointer; margin-left:auto;">+</span>
      </div>

      <div id="commonGroup" style="display:none; margin-left:10px; border-left:2px solid rgba(0,212,255,0.2); padding-left:8px;">
        <div class="toggle-row"><label><input type="checkbox" id="chkIHS" checked onchange="updateOLSVisibility()"> Inner Horizontal Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opIHS" class="opacity-slider" min="0" max="100" value="20" oninput="updateOpacity('IHS')">
          <span id="valIHS" class="opacity-value">20%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkConical" checked onchange="updateOLSVisibility()"> Conical Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opConical" class="opacity-slider" min="0" max="100" value="40" oninput="updateOpacity('Conical')">
          <span id="valConical" class="opacity-value">40%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkOHS" checked onchange="updateOLSVisibility()"> Outer Horizontal Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opOHS" class="opacity-slider" min="0" max="100" value="20" oninput="updateOpacity('OHS')">
          <span id="valOHS" class="opacity-value">20%</span>
        </div>
      </div>
    </div>

    <!-- RUNWAY 09 -->
      <div class="layer-group">
        <div class="toggle-row" onclick="toggleSectionWithIcon('rwy09Group', this.querySelector('span'), event)">
          <label style="cursor:pointer;">
            <input type="checkbox" id="chkRwy09" checked onchange="toggleRunwayGroup('09')"> Runway 09
          </label>
          <span style="cursor:pointer; margin-left:auto;">+</span>
        </div>

      <div id="rwy09Group" style="display:none; margin-left:10px; border-left:2px solid rgba(0,212,255,0.2); padding-left:8px;">
        
        <div class="toggle-row"><label><input type="checkbox" id="chkAppr1" checked onchange="updateOLSVisibility()"> Approach Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opAppr" class="opacity-slider" min="0" max="100" value="40" oninput="updateOpacity('Appr')">
          <span id="valAppr" class="opacity-value">40%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkTakeOff1" checked onchange="updateOLSVisibility()"> Take-off Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opTakeOff" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('TakeOff')">
          <span id="valTakeOff" class="opacity-value">60%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkTrans09" checked onchange="updateOLSVisibility()"> Transitional Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opTrans" class="opacity-slider" min="0" max="100" value="80" oninput="updateOpacity('Trans')">
          <span id="valTrans" class="opacity-value">80%</span>
        </div>

        <!-- OFZ -->
        <div class="toggle-row" onclick="toggleSectionWithIcon('ofz09', this.querySelector('span'), event)">
          <label>
            <input type="checkbox" id="chkOFZ09" checked onchange="toggleOFZGroup('09')"> OFZ
          </label>
          <span style="cursor:pointer; margin-left:auto;">+</span>
        </div>

        <div id="ofz09" style="display:none; margin-left:10px; border-left:2px solid rgba(0,212,255,0.2); padding-left:8px;">
          <div class="toggle-row"><label><input type="checkbox" id="chkInnerAppr1" checked onchange="updateOLSVisibility()"> Inner Approach Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opInnerAppr" class="opacity-slider" min="0" max="100" value="40" oninput="updateOpacity('InnerAppr')">
            <span id="valInnerAppr" class="opacity-value">40%</span>
          </div>

          <div class="toggle-row"><label><input type="checkbox" id="chkBLS1" checked onchange="updateOLSVisibility()"> Balked Landing Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opBLS" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('BLS')">
            <span id="valBLS" class="opacity-value">60%</span>
          </div>

          <div class="toggle-row"><label><input type="checkbox" id="chkITS1" checked onchange="updateOLSVisibility()"> Inner Transitional Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opITS" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('ITS')">
            <span id="valITS" class="opacity-value">60%</span>
          </div>
        </div>

      </div>
    </div>

    <!-- RUNWAY 27 -->
      <div class="layer-group">
        <div class="toggle-row" onclick="toggleSectionWithIcon('rwy27Group', this.querySelector('span'), event)">
          <label style="cursor:pointer;">
            <input type="checkbox" id="chkRwy27" checked onchange="toggleRunwayGroup('27')"> Runway 27
          </label>
          <span style="cursor:pointer; margin-left:auto;">+</span>
        </div>

      <div id="rwy27Group" style="display:none; margin-left:10px; border-left:2px solid rgba(0,212,255,0.2); padding-left:8px;">
        
        <div class="toggle-row"><label><input type="checkbox" id="chkAppr2" checked onchange="updateOLSVisibility()"> Approach Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opAppr2" class="opacity-slider" min="0" max="100" value="40" oninput="updateOpacity('Appr2')">
          <span id="valAppr2" class="opacity-value">40%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkTakeOff2" checked onchange="updateOLSVisibility()"> Take-off Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opTakeOff2" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('TakeOff2')">
          <span id="valTakeOff2" class="opacity-value">60%</span>
        </div>

        <div class="toggle-row"><label><input type="checkbox" id="chkTrans27" checked onchange="updateOLSVisibility()"> Transitional Surface</label></div>
        <div class="opacity-container">
          <input type="range" id="opTrans27" class="opacity-slider" min="0" max="100" value="80" oninput="updateOpacity('Trans27')">
          <span id="valTrans27" class="opacity-value">80%</span>
        </div>

        <!-- OFZ -->
        <div class="toggle-row" onclick="toggleSectionWithIcon('ofz27', this.querySelector('span'), event)">
          <label>
            <input type="checkbox" id="chkOFZ27" checked onchange="toggleOFZGroup('27')"> OFZ
          </label>
          <span style="cursor:pointer; margin-left:auto;">+</span>
        </div>

        <div id="ofz27" style="display:none; margin-left:10px; border-left:2px solid rgba(0,212,255,0.2); padding-left:8px;">
          <div class="toggle-row"><label><input type="checkbox" id="chkInnerAppr2" checked onchange="updateOLSVisibility()"> Inner Approach Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opInnerAppr2" class="opacity-slider" min="0" max="100" value="40" oninput="updateOpacity('InnerAppr2')">
            <span id="valInnerAppr2" class="opacity-value">40%</span>
          </div>

          <div class="toggle-row"><label><input type="checkbox" id="chkBLS2" checked onchange="updateOLSVisibility()"> Balked Landing Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opBLS2" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('BLS2')">
            <span id="valBLS2" class="opacity-value">60%</span>
          </div>

          <div class="toggle-row"><label><input type="checkbox" id="chkITS2" checked onchange="updateOLSVisibility()"> Inner Transitional Surface</label></div>
          <div class="opacity-container">
            <input type="range" id="opITS2" class="opacity-slider" min="0" max="100" value="60" oninput="updateOpacity('ITS2')">
            <span id="valITS2" class="opacity-value">60%</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    const CONFIG = {
      runway: { length: 3000, width: 45 },
      strip: { width: 280, extension: 60 },
      ihs: { radius: 4000, height: 45, opacity: 0.25 },
      conical: { slope: 0.05, extension: 2100, startHeight: 45, endHeight: 150, opacity: 0.35 }, 
      ohs: { radius: 15000, height: 150, opacity: 0.15 },
      transitional: { slope: 0.143, opacity: 0.5 },
      innerTransitional: { slope: 0.143, maxHeight: 45, opacity: 0.55 },
      takeoff: { innerEdge: 180, distFromEnd: 60, divergence: 0.125, slope: 0.02, length: 15000, finalWidthLimit: 1800, opacity: 0.4 },
      approach: { 
          innerEdge: 280, distFromThreshold: 60, divergence: 0.15, 
          seg1Len: 3000, seg1Slope: 0.02, seg2Len: 3600, seg2Slope: 0.025, seg3Len: 8400, seg3Slope: 0.0, 
          opacity: 0.3 
      },
      innerApproach: { innerEdge: 120, distFromThreshold: 60, length: 900, slope: 0.02, opacity: 0.6 },
      // Balked Landing: Starts 1800m after threshold. Ends at IHS (45m high).
      // Slope 3.33% = 1:30. Length to reach 45m = 45 * 30 = 1350m.
      balkedLanding: { innerEdge: 120, distFromThreshold: 1800, length: 1350, slope: 0.0333, divergence: 0.10, opacity: 0.6 }
    };

    let currentVScale = 4;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000000);
    camera.position.set(0, 40000, 20000);
    
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);

    const renderer = new THREE.WebGLRenderer({ 
      antialias: !isMobile,
      logarithmicDepthBuffer: true,
      powerPreference: "high-performance"
    });
    // --- Helper to reduce z-fighting (flickering) globally ---
    function applyDepthFix(root) {
      root.traverse(obj => {
        if (obj.isMesh && obj.material) {
          const mat = obj.material;
          mat.depthWrite = false;
          mat.polygonOffset = true;
          mat.polygonOffsetFactor = 1;
          mat.polygonOffsetUnits = 1;
          obj.renderOrder = 1;
        }
      });
    }
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(isMobile ? 1 : window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    const compassArrow = document.getElementById('compass-arrow');
    controls.enableDamping = true;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.rotateSpeed = isMobile ? 0.6 : 1;
    controls.zoomSpeed = isMobile ? 0.8 : 1.2;
    controls.target.set(0, 0, 0);
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl = new THREE.DirectionalLight(0xffffff, 0.5);
    dl.position.set(5000, 10000, 5000);
    scene.add(dl);


    const olsGroup = new THREE.Group();
    scene.add(olsGroup);

    function createBaseline() {
      // --- Ground Plane (subtle) ---
      const groundGeo = new THREE.PlaneGeometry(50000, 50000);
      const groundMat = new THREE.MeshPhongMaterial({
        color: 0x0a0a0a,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);

      // --- Runway ---
      const rwyGeo = new THREE.PlaneGeometry(CONFIG.runway.length, CONFIG.runway.width);
      const rwyMat = new THREE.MeshPhongMaterial({ color: 0x2f2f2f, side: THREE.DoubleSide });
      const rwy = new THREE.Mesh(rwyGeo, rwyMat);
      rwy.rotation.x = -Math.PI / 2;
      rwy.position.y = 1;
      scene.add(rwy);

      // --- Runway Centerline (between threshold markings) ---
      const centerlineMat = new THREE.LineBasicMaterial({ 
        color: 0xffffff,
        depthTest: false,
        transparent: true,
        opacity: 1
      });
      const centerPoints = [];
      const dashLength = 30; // ICAO standard
      const gapLength = 20;

      // limit strictly between threshold inner edges
      const stripeLength = 30;
      const thresholdInner = (CONFIG.runway.length / 2) - 6 - stripeLength;
      const usableStart = -thresholdInner;
      const usableEnd = thresholdInner;

      // --- Runway Numbers Position (needed before centerline exclusion logic) ---
      const thresholdInnerNum = (CONFIG.runway.length / 2) - 6 - stripeLength;
      const numberPos = thresholdInnerNum - 12;

      // Exclude centerline dashes under runway numbers (both ends)
      const exclusionHalf = 10; // buffer zone around runway numbers (~9m length + margin)
      for (let i = usableStart; i < usableEnd; i += dashLength + gapLength) {
        const mid = i + dashLength / 2;

        // Number position (already 12m from threshold)
        // Exclude dashes within ~10m of either number
        const nearPosEnd = Math.abs(mid - numberPos) < exclusionHalf;
        const nearNegEnd = Math.abs(mid + numberPos) < exclusionHalf;
        if (nearPosEnd || nearNegEnd) continue;

        centerPoints.push(new THREE.Vector3(i, 3, 0));
        centerPoints.push(new THREE.Vector3(i + dashLength, 3, 0));
      }

      const centerGeo = new THREE.BufferGeometry().setFromPoints(centerPoints);
      const centerLine = new THREE.LineSegments(centerGeo, centerlineMat);
      scene.add(centerLine);
      centerLine.renderOrder = 999;

      // --- Runway Edge Rectangle (side strip markings as full boundary) ---
      const edgeMat = new THREE.LineBasicMaterial({ 
        color: 0xffffff,
        depthTest: false,
        transparent: true,
        opacity: 1
      });
      const edgeOffset = CONFIG.runway.width / 2 - 1;
      const halfLen = CONFIG.runway.length / 2;

      const edgePoints = [
        new THREE.Vector3(-halfLen, 3, -edgeOffset),
        new THREE.Vector3(halfLen, 3, -edgeOffset),
        new THREE.Vector3(halfLen, 3, edgeOffset),
        new THREE.Vector3(-halfLen, 3, edgeOffset)
      ];

      const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePoints);
      const edgeRect = new THREE.LineLoop(edgeGeo, edgeMat);
      scene.add(edgeRect);
      edgeRect.renderOrder = 999;

      // --- Runway Numbers (Designators 09 / 27) ---
      function createRunwayNumber(text, xPos, rotationZ = 0) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, canvas.width, canvas.height); // transparent background

        ctx.fillStyle = 'white';
        ctx.font = 'bold 100px Arial'; // reduced font size for better proportion
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        const mat = new THREE.MeshBasicMaterial({ 
          map: texture, 
          transparent: true,
          depthWrite: false,
          depthTest: false
        });

        // Numbers are ~9m tall (ICAO typical)
        const geo = new THREE.PlaneGeometry(50, 50);
        const mesh = new THREE.Mesh(geo, mat);

        mesh.rotation.x = -Math.PI / 2;
        mesh.rotation.z = rotationZ - Math.PI / 2; // rotate 90° left for proper alignment
        mesh.position.set(xPos, 4, 0);

        scene.add(mesh);
        mesh.renderOrder = 999;
      }


      createRunwayNumber('09', -numberPos, 0);
      createRunwayNumber('27', numberPos, Math.PI);

      // --- Threshold Markings (inside runway edges) ---
      const thrMat = new THREE.MeshBasicMaterial({ 
        color: 0xffffff,
        transparent: true,
        depthWrite: false,
        depthTest: false
      });
      const stripeWidth = 1.8;
      // reuse existing stripeLength
      const stripeGap = 4;
      const stripesCount = 6;

      [1, -1].forEach(dir => {
        // 6m inside from runway end (not threshold): subtract half stripe length for centering
        const baseX = (CONFIG.runway.length / 2 - 6 - stripeLength / 2) * dir; // 6m inside from runway end

        for (let i = 0; i < stripesCount; i++) {
          const offset = (i - (stripesCount / 2 - 0.5)) * (stripeWidth + stripeGap);

          const stripeGeo = new THREE.PlaneGeometry(stripeLength, stripeWidth);
          const stripe = new THREE.Mesh(stripeGeo, thrMat);

          stripe.rotation.x = -Math.PI / 2;
          stripe.position.set(baseX, 3, offset);

          scene.add(stripe);
          stripe.renderOrder = 999;
        }
      });

      // --- Touchdown Zone Markings (pairs at intervals) ---
      // ICAO: 4 pairs at 150m, 300m, 450m, 600m from threshold (skip aiming point overlap)
      const tdzMat = new THREE.MeshBasicMaterial({ 
        color: 0xffffff,
        transparent: true,
        depthWrite: false,
        depthTest: false
      });
      const tdzDistances = [150, 300, 450, 600];

      [1, -1].forEach(dir => {
        const aimX = (CONFIG.runway.length / 2 - 300) * dir;

        tdzDistances.forEach(dist => {
          const x = (CONFIG.runway.length / 2 - dist) * dir;

          // skip if overlapping aiming point
          if (Math.abs(x - aimX) < 40) return;

          const offsets = [-18, -10, 10, 18];

          offsets.forEach(z => {
            const stripe = new THREE.Mesh(
              new THREE.PlaneGeometry(22.5, 1.8),
              tdzMat
            );
            stripe.rotation.x = -Math.PI / 2;
            stripe.position.set(x, 3, z);
            scene.add(stripe);
            stripe.renderOrder = 999;
          });
        });
      });

      // --- Aiming Point Markings (1000 ft ≈ 300m from threshold) ---
      const aimMat = new THREE.MeshBasicMaterial({ 
        color: 0xffffff,
        transparent: true,
        depthWrite: false,
        depthTest: false
      });
      const aimLength = 45;
      const aimWidth = 6;
      // aimOffset already defined above (distance from threshold)

      [1, -1].forEach(dir => {
        const x = (CONFIG.runway.length / 2 - 300) * dir;

        // Left block
        const left = new THREE.Mesh(
          new THREE.PlaneGeometry(aimLength, aimWidth),
          aimMat
        );
        left.rotation.x = -Math.PI / 2;
        left.position.set(x, 3, -12);
        scene.add(left);
        left.renderOrder = 999;

        // Right block
        const right = new THREE.Mesh(
          new THREE.PlaneGeometry(aimLength, aimWidth),
          aimMat
        );
        right.rotation.x = -Math.PI / 2;
        right.position.set(x, 3, 12);
        scene.add(right);
        right.renderOrder = 999;
      });

      // --- Strip ---
      const sLen = CONFIG.runway.length + (CONFIG.strip.extension * 2);
      const sGeo = new THREE.PlaneGeometry(sLen, CONFIG.strip.width);
      const sMat = new THREE.MeshPhongMaterial({ color: 0x1a331a, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
      const sMesh = new THREE.Mesh(sGeo, sMat);
      sMesh.rotation.x = -Math.PI / 2;
      sMesh.position.y = 0.5;
      scene.add(sMesh);
    }

    function createVolumetricSkeleton(ptsTop, color) {
        const group = new THREE.Group();
        const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 });
        
        const topGeo = new THREE.BufferGeometry().setFromPoints(ptsTop);
        group.add(new THREE.LineLoop(topGeo, mat));
        
        const ptsBot = ptsTop.map(p => new THREE.Vector3(p.x, 0, p.z));
        const botGeo = new THREE.BufferGeometry().setFromPoints(ptsBot);
        group.add(new THREE.LineLoop(botGeo, mat));
        
        ptsTop.forEach((p, i) => {
            const ribGeo = new THREE.BufferGeometry().setFromPoints([p, ptsBot[i]]);
            group.add(new THREE.Line(ribGeo, mat));
        });
        
        return group;
    }

    function createPerimeterLines(points, height, color) {
        const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.8 });
        const geometry = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, height, p.y)));
        return new THREE.LineLoop(geometry, material);
    }

    function createWallsForShape(points, bottomY, topY, color, opacity) {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      points.forEach((p, i) => {
        const nextP = points[(i + 1) % points.length];
        vertices.push(p.x, bottomY, p.y); vertices.push(p.x, topY, p.y); vertices.push(nextP.x, bottomY, nextP.y);
        vertices.push(p.x, topY, p.y); vertices.push(nextP.x, topY, nextP.y); vertices.push(nextP.x, bottomY, nextP.y);
      });
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide }));
    }

    function generateIHS(vScale) {
      const radius = CONFIG.ihs.radius;
      const rHalf = CONFIG.runway.length / 2;
      const segments = 128;
      const scaledHeight = CONFIG.ihs.height * vScale;
      const shape = new THREE.Shape();
      shape.absarc(rHalf, 0, radius, -Math.PI / 2, Math.PI / 2, false);
      shape.absarc(-rHalf, 0, radius, Math.PI / 2, -Math.PI / 2, false);
      shape.closePath();
      const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape, segments), new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: CONFIG.ihs.opacity, side: THREE.DoubleSide }));
      mesh.rotation.x = -Math.PI / 2; mesh.position.y = scaledHeight;
      olsGroup.add(mesh);
      const points = shape.getPoints(segments);
      const walls = createWallsForShape(points, 0, scaledHeight, 0x00ffff, CONFIG.ihs.opacity);
      olsGroup.add(walls);
      const lines = new THREE.Group();
      lines.add(createPerimeterLines(points, scaledHeight, 0x00ffff));
      lines.add(createPerimeterLines(points, 0, 0x00ffff));
      olsGroup.add(lines);
      return { mesh, walls, lines };
    }

    function generateConical(vScale) {
      const rInner = CONFIG.ihs.radius; const rOuter = rInner + CONFIG.conical.extension;
      const rHalf = CONFIG.runway.length / 2; const segments = 128;
      const sHeight = CONFIG.conical.startHeight * vScale; const eHeight = CONFIG.conical.endHeight * vScale;
      const geometry = new THREE.BufferGeometry(); const vertices = []; const indices = [];
      const outerPoints = []; const innerPoints = [];
      for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * Math.PI * 2; const cos = Math.cos(theta); const sin = Math.sin(theta);
        const xOff = (cos >= 0) ? rHalf : -rHalf;
        vertices.push(xOff + rInner * cos, sHeight, rInner * sin);
        vertices.push(xOff + rOuter * cos, eHeight, rOuter * sin);
        if (i < segments) {
            innerPoints.push({ x: xOff + rInner * cos, y: rInner * sin });
            outerPoints.push({ x: xOff + rOuter * cos, y: rOuter * sin });
        }
      }
      for (let i = 0; i < segments; i++) {
        const v0 = i * 2, v1 = i * 2 + 1, v2 = (i + 1) * 2, v3 = (i + 1) * 2 + 1;
        indices.push(v0, v1, v2, v1, v3, v2);
      }
      geometry.setIndex(indices); geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3)); geometry.computeVertexNormals();
      const mesh = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: 0xffa500, transparent: true, opacity: CONFIG.conical.opacity, side: THREE.DoubleSide }));
      olsGroup.add(mesh);
      const walls = createWallsForShape(outerPoints, 0, eHeight, 0xffa500, CONFIG.conical.opacity);
      const innerWalls = createWallsForShape(innerPoints, 0, sHeight, 0xffa500, CONFIG.conical.opacity);
      olsGroup.add(walls, innerWalls);
      const lines = new THREE.Group();
      lines.add(createPerimeterLines(innerPoints, sHeight, 0xffa500), createPerimeterLines(outerPoints, eHeight, 0xffa500));
      olsGroup.add(lines);
      return { mesh, walls, innerWalls, lines };
    }

    function generateOHS(vScale) {
      const radius = CONFIG.ohs.radius; const scaledHeight = CONFIG.ohs.height * vScale;
      const mesh = new THREE.Mesh(new THREE.CircleGeometry(radius, 128), new THREE.MeshPhongMaterial({ color: 0x9933ff, transparent: true, opacity: CONFIG.ohs.opacity, side: THREE.DoubleSide }));
      mesh.rotation.x = -Math.PI / 2; mesh.position.y = scaledHeight;
      olsGroup.add(mesh);
      const wallPoints = []; const segments = 128;
      for(let i=0; i<segments; i++){
        const theta = (i / segments) * Math.PI * 2;
        wallPoints.push({ x: Math.cos(theta) * radius, y: Math.sin(theta) * radius });
      }
      const walls = createWallsForShape(wallPoints, 0, scaledHeight, 0x9933ff, CONFIG.ohs.opacity);
      olsGroup.add(walls);
      const lines = new THREE.Group();
      lines.add(createPerimeterLines(wallPoints, scaledHeight, 0x9933ff), createPerimeterLines(wallPoints, 0, 0x9933ff));
      olsGroup.add(lines);
      return { mesh, walls, lines };
    }

    function generateTransitional(vScale) {
        const rHalf = CONFIG.runway.length / 2; const sHalfLen = rHalf + CONFIG.strip.extension;
        const sHalfWid = CONFIG.strip.width / 2; const ihsHeight = CONFIG.ihs.height * vScale;
        const slope = CONFIG.transitional.slope; const transitionWidth = CONFIG.ihs.height / slope;
        const addQuad = (v1, v2, v3, v4, arr) => {
            arr.push(v1.x, v1.y, v1.z, v2.x, v2.y, v2.z, v4.x, v4.y, v4.z);
            arr.push(v2.x, v2.y, v2.z, v3.x, v3.y, v3.z, v4.x, v4.y, v4.z);
        };
        const createSurfaceGroup = (vertices, wallVertices) => {
            const grp = new THREE.Group();
            const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3)); geo.computeVertexNormals();
            grp.add(new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x0077ff, transparent: true, opacity: CONFIG.transitional.opacity, side: THREE.DoubleSide })));
            const wallGeo = new THREE.BufferGeometry(); wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3)); wallGeo.computeVertexNormals();
            grp.add(new THREE.Mesh(wallGeo, new THREE.MeshPhongMaterial({ color: 0x0077ff, transparent: true, opacity: CONFIG.transitional.opacity * 0.7, side: THREE.DoubleSide })));
            grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x0077ff, transparent: true, opacity: 0.6 })));
            return grp;
        };
        const centralVerts = []; const centralWalls = [];
        [1, -1].forEach(side => {
            const h1 = { x: -sHalfLen, y: 0, z: sHalfWid * side }; const h2 = { x: sHalfLen, y: 0, z: sHalfWid * side };
            const o1 = { x: -sHalfLen, y: ihsHeight, z: (sHalfWid + transitionWidth) * side }; const o2 = { x: sHalfLen, y: ihsHeight, z: (sHalfWid + transitionWidth) * side };
            addQuad(h1, h2, o2, o1, centralVerts);
            const o1G = { ...o1, y: 0 }; const o2G = { ...o2, y: 0 }; addQuad(o1, o2, o2G, o1G, centralWalls);
        });
        const gCentral = createSurfaceGroup(centralVerts, centralWalls); olsGroup.add(gCentral);
        const generateEndTrans = (dir) => {
            const verts = []; const walls = [];
            [1, -1].forEach(side => {
                const appStartX = (rHalf + CONFIG.approach.distFromThreshold) * dir;
                const ha = { x: appStartX, y: 0, z: (CONFIG.approach.innerEdge/2) * side };
                const oa = { x: appStartX, y: ihsHeight, z: (CONFIG.approach.innerEdge/2 + transitionWidth) * side };
                const distToIHS = CONFIG.ihs.height / CONFIG.approach.seg1Slope;
                const hbX = appStartX + (distToIHS * dir); const hbW = (CONFIG.approach.innerEdge/2) + (distToIHS * CONFIG.approach.divergence);
                const hb = { x: hbX, y: ihsHeight, z: hbW * side };
                verts.push(ha.x, ha.y, ha.z, hb.x, hb.y, hb.z, oa.x, oa.y, oa.z);
                const oaG = { ...oa, y: 0 }; const hbG = { ...hb, y: 0 }; addQuad(oa, hb, hbG, oaG, walls);
                walls.push(ha.x, ha.y, ha.z, hb.x, hb.y, hb.z, hb.x, 0, hb.z);
                const hStripEnd = { x: sHalfLen * dir, y: 0, z: sHalfWid * side };
                const oStripEnd = { x: sHalfLen * dir, y: ihsHeight, z: (sHalfWid + transitionWidth) * side };
                addQuad(hStripEnd, ha, oa, oStripEnd, verts);
                const oStripEndG = { ...oStripEnd, y: 0 }; addQuad(oStripEnd, oa, oaG, oStripEndG, walls);
            });
            return createSurfaceGroup(verts, walls);
        };
        const g09 = generateEndTrans(1); const g27 = generateEndTrans(-1);
        olsGroup.add(g09, g27);
        return { gCentral, g09, g27 };
    }

    function createSingleTakeOff(side, vScale) {
      const rHalf = CONFIG.runway.length / 2;
      const cfg = CONFIG.takeoff;
      const dir = -side;
      const startX = (rHalf + cfg.distFromEnd) * dir;
      const distLimit = (cfg.finalWidthLimit - cfg.innerEdge) / (2 * cfg.divergence);
      
      const p1 = new THREE.Vector3(startX, 0, -cfg.innerEdge/2); 
      const p2 = new THREE.Vector3(startX, 0, cfg.innerEdge/2);  

      let pts = [];
      if (distLimit < cfg.length) {
        const tX = startX + (distLimit * dir);
        const tW = cfg.finalWidthLimit;
        const tH = (distLimit * cfg.slope) * vScale;
        const eX = startX + (cfg.length * dir);
        const eH = (cfg.length * cfg.slope) * vScale;
        pts = [
            p1, p2, 
            new THREE.Vector3(tX, tH, tW/2),
            new THREE.Vector3(eX, eH, tW/2),
            new THREE.Vector3(eX, eH, -tW/2),
            new THREE.Vector3(tX, tH, -tW/2)
        ];
      } else {
        const eX = startX + (cfg.length * dir);
        const eW = cfg.innerEdge + (2 * cfg.length * cfg.divergence);
        const eH = (cfg.length * cfg.slope) * vScale;
        pts = [
            p1, p2,
            new THREE.Vector3(eX, eH, eW/2),
            new THREE.Vector3(eX, eH, -eW/2)
        ];
      }

      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      if(pts.length === 6) geo.setIndex([0, 1, 5, 1, 2, 5, 2, 4, 5, 2, 3, 4]);
      else geo.setIndex([0, 1, 2, 0, 2, 3]);
      geo.computeVertexNormals();

      const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0xff1493, transparent: true, opacity: cfg.opacity, side: THREE.DoubleSide }));
      const wallVertices = [];
      pts.forEach((p, i) => {
        const next = pts[(i+1)%pts.length];
        wallVertices.push(p.x, 0, p.z, p.x, p.y, p.z, next.x, 0, next.z);
        wallVertices.push(p.x, p.y, p.z, next.x, next.y, next.z, next.x, 0, next.z);
      });
      const wallGeo = new THREE.BufferGeometry(); wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3)); wallGeo.computeVertexNormals();
      const wallMesh = new THREE.Mesh(wallGeo, new THREE.MeshPhongMaterial({ color: 0xff1493, transparent: true, opacity: cfg.opacity * 0.7, side: THREE.DoubleSide }));
      const line = createVolumetricSkeleton(pts, 0xff1493);
      return { mesh, wallMesh, line };
    }

    function createSingleApproach(side, vScale) {
      const cfg = CONFIG.approach; const rHalf = CONFIG.runway.length / 2;
      const startX = (rHalf + cfg.distFromThreshold) * side;
      const h0 = 0; const w0 = cfg.innerEdge;
      const h1 = (cfg.seg1Len * cfg.seg1Slope) * vScale; const w1 = w0 + (2 * cfg.seg1Len * cfg.divergence); const x1 = startX + (cfg.seg1Len * side);
      const h2 = h1 + (cfg.seg2Len * cfg.seg2Slope) * vScale; const w2 = w1 + (2 * cfg.seg2Len * cfg.divergence); const x2 = x1 + (cfg.seg2Len * side);
      const h3 = h2; const w3 = w2 + (2 * cfg.seg3Len * cfg.divergence); const x3 = x2 + (cfg.seg3Len * side);
      
      const pts = [
        new THREE.Vector3(startX, h0, -w0/2), new THREE.Vector3(startX, h0, w0/2),
        new THREE.Vector3(x1, h1, w1/2), new THREE.Vector3(x2, h2, w2/2),
        new THREE.Vector3(x3, h3, w3/2), new THREE.Vector3(x3, h3, -w3/2),
        new THREE.Vector3(x2, h2, -w2/2), new THREE.Vector3(x1, h1, -w1/2)
      ];

      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      geo.setIndex([0, 1, 7, 1, 2, 7, 2, 6, 7, 2, 3, 6, 3, 5, 6, 3, 4, 5]); geo.computeVertexNormals();
      const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x32cd32, transparent: true, opacity: cfg.opacity, side: THREE.DoubleSide }));
      
      const wallVertices = [];
      pts.forEach((p, i) => {
        const next = pts[(i+1)%pts.length];
        wallVertices.push(p.x, 0, p.z, p.x, p.y, p.z, next.x, 0, next.z);
        wallVertices.push(p.x, p.y, p.z, next.x, next.y, next.z, next.x, 0, next.z);
      });
      const wallGeo = new THREE.BufferGeometry(); wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3)); wallGeo.computeVertexNormals();
      const wallMesh = new THREE.Mesh(wallGeo, new THREE.MeshPhongMaterial({ color: 0x32cd32, transparent: true, opacity: cfg.opacity * 0.7, side: THREE.DoubleSide }));
      
      const lineGroup = createVolumetricSkeleton(pts, 0x32cd32);
      
      const delineatorMat = new THREE.LineBasicMaterial({ color: 0x32cd32, transparent: true, opacity: 0.9, linewidth: 2 });
      const l1Geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1, h1, -w1/2), new THREE.Vector3(x1, h1, w1/2)]);
      lineGroup.add(new THREE.Line(l1Geo, delineatorMat));
      const l2Geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x2, h2, -w2/2), new THREE.Vector3(x2, h2, w2/2)]);
      lineGroup.add(new THREE.Line(l2Geo, delineatorMat));
      
      return { mesh, wallMesh, line: lineGroup };
    }

    function createSingleInnerApproach(side, vScale) {
        const cfg = CONFIG.innerApproach; const rHalf = CONFIG.runway.length / 2;
        const startX = (rHalf + cfg.distFromThreshold) * side; const endX = startX + (cfg.length * side); const endHeight = (cfg.length * cfg.slope) * vScale;
        const pts = [new THREE.Vector3(startX, 0, -cfg.innerEdge/2), new THREE.Vector3(startX, 0, cfg.innerEdge/2), new THREE.Vector3(endX, endHeight, cfg.innerEdge/2), new THREE.Vector3(endX, endHeight, -cfg.innerEdge/2)];
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        geo.setIndex([0, 1, 2, 0, 2, 3]); geo.computeVertexNormals();
        const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: cfg.opacity, side: THREE.DoubleSide }));
        const wallVertices = [];
        pts.forEach((p, i) => {
            const next = pts[(i+1)%pts.length];
            wallVertices.push(p.x, 0, p.z, p.x, p.y, p.z, next.x, 0, next.z);
            wallVertices.push(p.x, p.y, p.z, next.x, next.y, next.z, next.x, 0, next.z);
        });
        const wallGeo = new THREE.BufferGeometry(); wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3)); wallGeo.computeVertexNormals();
        const wallMesh = new THREE.Mesh(wallGeo, new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: cfg.opacity * 0.7, side: THREE.DoubleSide }));
        const line = createVolumetricSkeleton(pts, 0x00ffff);
        return { mesh, wallMesh, line };
    }

    function createSingleBalkedLanding(side, vScale) {
        const cfg = CONFIG.balkedLanding; 
        const rHalf = CONFIG.runway.length / 2;
        // The BLS starts at a distance from the landing threshold (side * rHalf) 
        // and extends INTO the climb-out direction (opposite of approach).
        const startX = (rHalf - cfg.distFromThreshold) * side; 
        const endX = startX - (cfg.length * side); 
        const endHeight = (cfg.length * cfg.slope) * vScale;
        const endWidth = cfg.innerEdge + (2 * cfg.length * cfg.divergence);

        const pts = [
            new THREE.Vector3(startX, 0, -cfg.innerEdge/2),
            new THREE.Vector3(startX, 0, cfg.innerEdge/2),
            new THREE.Vector3(endX, endHeight, endWidth/2),
            new THREE.Vector3(endX, endHeight, -endWidth/2)
        ];

        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        geo.setIndex([0, 1, 2, 0, 2, 3]); geo.computeVertexNormals();
        const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0xff4500, transparent: true, opacity: cfg.opacity, side: THREE.DoubleSide }));
        
        const wallVertices = [];
        pts.forEach((p, i) => {
            const next = pts[(i+1)%pts.length];
            wallVertices.push(p.x, 0, p.z, p.x, p.y, p.z, next.x, 0, next.z);
            wallVertices.push(p.x, p.y, p.z, next.x, next.y, next.z, next.x, 0, next.z);
        });
        const wallGeo = new THREE.BufferGeometry(); wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3)); wallGeo.computeVertexNormals();
        const wallMesh = new THREE.Mesh(wallGeo, new THREE.MeshPhongMaterial({ color: 0xff4500, transparent: true, opacity: cfg.opacity * 0.7, side: THREE.DoubleSide }));
        const line = createVolumetricSkeleton(pts, 0xff4500);
        
        return { mesh, wallMesh, line };
    }


    function createITSForRunway(vScale) {
        const cfg = CONFIG.innerTransitional;
        const rHalf = CONFIG.runway.length / 2;
        const ia = CONFIG.innerApproach;

        // IAS limits (approach side)
        const iaStartX = rHalf + ia.distFromThreshold;        // inner end of IAS
        const iaEndX = iaStartX + ia.length;                  // outer end of IAS

        // BLS limits (towards runway side)
        const blsStartX = rHalf - CONFIG.balkedLanding.distFromThreshold; // BLS start (at 0 height)
        const blsEndX = blsStartX - CONFIG.balkedLanding.length;          // where BLS reaches ~45m

        // Overall ITS span: from BLS far end → IAS far end
        const startX = blsEndX;
        const endX = iaEndX;

        const edge = ia.innerEdge / 2;
        // Inner edge follows IAS on approach side and BLS on runway side
        const getInnerEdgeHalf = (x) => {
            // BLS region (inner edge expands with divergence)
            if (x <= blsStartX) {
                // distance from BLS start towards BLS end
                const dist = Math.max(0, blsStartX - x);
                return (CONFIG.balkedLanding.innerEdge / 2) + (dist * CONFIG.balkedLanding.divergence);
            }
            // Flat region between BLS start and IAS start
            if (x < iaStartX) {
                return ia.innerEdge / 2;
            }
            // IAS region (constant inner edge)
            return ia.innerEdge / 2;
        };
        const topHeight = cfg.maxHeight * vScale;             // 45m IHS

        const vertices = [];

        const addQuad = (v1, v2, v3, v4) => {
            vertices.push(
                v1.x, v1.y, v1.z,
                v2.x, v2.y, v2.z,
                v4.x, v4.y, v4.z
            );
            vertices.push(
                v2.x, v2.y, v2.z,
                v3.x, v3.y, v3.z,
                v4.x, v4.y, v4.z
            );
        };

        const slopeITS = 0.3333;
        const runAt = (baseHeightScaled) => {
            const baseHeightTrue = baseHeightScaled / vScale; // remove scaling effect
            return (cfg.maxHeight - baseHeightTrue) / slopeITS;
        };

        // Height along ITS span
        const getHeight = (x) => {
            // Region 1: Beyond BLS (constant top region start)
            if (x <= blsEndX) return CONFIG.balkedLanding.length * CONFIG.balkedLanding.slope * vScale;

            // Region 2: BLS zone
            if (x <= blsStartX) {
                const dist = blsStartX - x;
                return dist * CONFIG.balkedLanding.slope * vScale;
            }

            // Region 3: Flat (between BLS start and IAS start)
            if (x < iaStartX) return 0;

            // Region 4: IAS zone
            const dist = x - iaStartX;
            return Math.min(dist, ia.length) * ia.slope * vScale;
        };
        const getOuter = (x, baseH, innerE) => {
            if (x > blsStartX && x < iaStartX) {
                return innerE + runAt(0);
            }
            return innerE + runAt(baseH);
        };

        const buildSide = (side) => {

            // Key longitudinal points
            const xBLSend = startX;
            const xBLSstart = blsStartX;
            const xIASstart = iaStartX;
            const xIASend = endX;

            const xs = [xBLSend, xBLSstart, xIASstart, xIASend];

            for (let i = 0; i < xs.length - 1; i++) {

                const x1 = xs[i];
                const x2 = xs[i + 1];

                const h1y = getHeight(x1);
                const h2y = getHeight(x2);

                const e1 = getInnerEdgeHalf(x1);
                const e2 = getInnerEdgeHalf(x2);

                const h1 = { x: x1, y: h1y, z: e1 * side };
                const h2 = { x: x2, y: h2y, z: e2 * side };

                const o1 = { x: x1, y: topHeight, z: getOuter(x1, h1y, e1) * side };
                const o2 = { x: x2, y: topHeight, z: getOuter(x2, h2y, e2) * side };

                addQuad(h1, h2, o2, o1);
            }
        };

        buildSide(1);
        buildSide(-1);

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geo.computeVertexNormals();

        const mesh = new THREE.Mesh(
            geo,
            new THREE.MeshPhongMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: cfg.opacity,
                side: THREE.DoubleSide
            })
        );

        // --- Add vertical walls along outer edges using the same xs points ---
        const wallVertices = [];

        const pushWall = (p1, p2) => {
            wallVertices.push(
                p1.x, 0, p1.z,
                p1.x, p1.y, p1.z,
                p2.x, 0, p2.z,

                p1.x, p1.y, p1.z,
                p2.x, p2.y, p2.z,
                p2.x, 0, p2.z
            );
        };

        // use xs array for 4 sections
        const xs = [startX, blsStartX, iaStartX, endX];
        for (let i = 0; i < xs.length - 1; i++) {
            const x1 = xs[i];
            const x2 = xs[i + 1];

            const h1y = getHeight(x1);
            const h2y = getHeight(x2);

            const e1 = getInnerEdgeHalf(x1);
            const e2 = getInnerEdgeHalf(x2);

            // left (side=1)
            const o1L = { x: x1, y: topHeight, z: getOuter(x1, h1y, e1) };
            const o2L = { x: x2, y: topHeight, z: getOuter(x2, h2y, e2) };
            pushWall(o1L, o2L);
            // right (side=-1)
            const o1R = { x: x1, y: topHeight, z: -getOuter(x1, h1y, e1) };
            const o2R = { x: x2, y: topHeight, z: -getOuter(x2, h2y, e2) };
            pushWall(o2R, o1R);
        }

        // --- Add vertical walls along INNER edges (following IAS + BLS edges) ---
        for (let i = 0; i < xs.length - 1; i++) {
            const x1 = xs[i];
            const x2 = xs[i + 1];

            const h1y = getHeight(x1);
            const h2y = getHeight(x2);

            const e1 = getInnerEdgeHalf(x1);
            const e2 = getInnerEdgeHalf(x2);

            // left inner wall
            const i1L = { x: x1, y: h1y, z: e1 };
            const i2L = { x: x2, y: h2y, z: e2 };
            pushWall(i1L, i2L);

            // right inner wall
            const i1R = { x: x1, y: h1y, z: -e1 };
            const i2R = { x: x2, y: h2y, z: -e2 };
            pushWall(i2R, i1R);
        }

        // --- Add trapezium walls at IAS outer end (closing sides only) ---
        const xEnd = endX;
        const hEnd = getHeight(xEnd);
        const eEnd = getInnerEdgeHalf(xEnd);


        const oEnd = getOuter(xEnd, hEnd, eEnd);

        // LEFT trapezium (IAS side)
        const iEndL = { x: xEnd, y: hEnd, z: eEnd };
        const oEndL = { x: xEnd, y: topHeight, z: oEnd };

        wallVertices.push(
            iEndL.x, 0, iEndL.z,
            iEndL.x, iEndL.y, iEndL.z,
            oEndL.x, 0, oEndL.z,

            iEndL.x, iEndL.y, iEndL.z,
            oEndL.x, oEndL.y, oEndL.z,
            oEndL.x, 0, oEndL.z
        );

        // RIGHT trapezium (IAS side)
        const iEndR = { x: xEnd, y: hEnd, z: -eEnd };
        const oEndR = { x: xEnd, y: topHeight, z: -oEnd };

        wallVertices.push(
            iEndR.x, 0, iEndR.z,
            oEndR.x, 0, oEndR.z,
            iEndR.x, iEndR.y, iEndR.z,

            iEndR.x, iEndR.y, iEndR.z,
            oEndR.x, 0, oEndR.z,
            oEndR.x, oEndR.y, oEndR.z
        );


        const wallGeo = new THREE.BufferGeometry();
        wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3));
        wallGeo.computeVertexNormals();

        const wallMesh = new THREE.Mesh(
            wallGeo,
            new THREE.MeshPhongMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: cfg.opacity * 0.7,
                side: THREE.DoubleSide
            })
        );

        // --- Boundary Lines (longitudinal: outer, inner, and bottom inner edges) ---
        const lineMat = new THREE.LineBasicMaterial({
            color: 0xffff00,
            transparent: true,
            opacity: 0.85
        });

        const xsLine = [startX, blsStartX, iaStartX, endX];

        const topOuterL = [];
        const topOuterR = [];
        const bottomInnerL = [];
        const bottomInnerR = [];

        xsLine.forEach(x => {
            const h = getHeight(x);
            const e = getInnerEdgeHalf(x);
            const o = getOuter(x, h, e);

            // LEFT side (positive Z)
            topOuterL.push(new THREE.Vector3(x, topHeight, o));
            bottomInnerL.push(new THREE.Vector3(x, h, e));

            // RIGHT side (negative Z)
            topOuterR.push(new THREE.Vector3(x, topHeight, -o));
            bottomInnerR.push(new THREE.Vector3(x, h, -e));
        });

        const makeLine = (pts) =>
        new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts),
            lineMat
        );

        const lineGroup = new THREE.Group();

        // longitudinal edges
        lineGroup.add(
            makeLine(topOuterL),
            makeLine(topOuterR),
            makeLine(bottomInnerL),
            makeLine(bottomInnerR)
        );

        // --- ADD outer-end boundary lines (vertical closures) ---
        const addEndLine = (x) => {
            const h = getHeight(x);
            const e = getInnerEdgeHalf(x);
            const o = getOuter(x, h, e);

            // LEFT vertical edge
            lineGroup.add(makeLine([
                new THREE.Vector3(x, h, e),
                new THREE.Vector3(x, topHeight, o)
            ]));

            // RIGHT vertical edge
            lineGroup.add(makeLine([
                new THREE.Vector3(x, h, -e),
                new THREE.Vector3(x, topHeight, -o)
            ]));
        };
        // IAS outer end
        addEndLine(endX);
        // BLS far end
        addEndLine(startX);

        return { mesh, wallMesh, line: lineGroup };
    }

    // --- MIRRORED (RWY 27) Inner Transitional Surface ---
    function createITSForRunway27(vScale) {
        const cfg = CONFIG.innerTransitional;
        const rHalf = CONFIG.runway.length / 2;
        const ia = CONFIG.innerApproach;

        // Mirror everything along runway center
        const iaStartX = -(rHalf + ia.distFromThreshold);
        const iaEndX = iaStartX - ia.length;

        const blsStartX = -(rHalf - CONFIG.balkedLanding.distFromThreshold);
        const blsEndX = blsStartX + CONFIG.balkedLanding.length;

        const startX = blsEndX;
        const endX = iaEndX;

        const getInnerEdgeHalf = (x) => {
            if (x >= blsStartX) {
                const dist = Math.max(0, x - blsStartX);
                return (CONFIG.balkedLanding.innerEdge / 2) + (dist * CONFIG.balkedLanding.divergence);
            }
            if (x > iaStartX) {
                return ia.innerEdge / 2;
            }
            return ia.innerEdge / 2;
        };

        const topHeight = cfg.maxHeight * vScale;

        const vertices = [];
        const addQuad = (v1, v2, v3, v4) => {
            vertices.push(
                v1.x, v1.y, v1.z,
                v2.x, v2.y, v2.z,
                v4.x, v4.y, v4.z
            );
            vertices.push(
                v2.x, v2.y, v2.z,
                v3.x, v3.y, v3.z,
                v4.x, v4.y, v4.z
            );
        };
        const slopeITS = 0.3333;
        const runAt = (baseHeightScaled) => {
            const baseHeightTrue = baseHeightScaled / vScale;
            return (cfg.maxHeight - baseHeightTrue) / slopeITS;
        };

        const getHeight = (x) => {
            if (x >= blsEndX) return CONFIG.balkedLanding.length * CONFIG.balkedLanding.slope * vScale;

            if (x >= blsStartX) {
                const dist = x - blsStartX;
                return dist * CONFIG.balkedLanding.slope * vScale;
            }

            if (x > iaStartX) return 0;

            const dist = iaStartX - x;
            return Math.min(dist, ia.length) * ia.slope * vScale;
        };
        const getOuter = (x, baseH, innerE) => {
            if (x < blsStartX && x > iaStartX) {
                return innerE + runAt(0);
            }
            return innerE + runAt(baseH);
        };

        const buildSide = (side) => {
            const xs = [startX, blsStartX, iaStartX, endX];

            for (let i = 0; i < xs.length - 1; i++) {
                const x1 = xs[i];
                const x2 = xs[i + 1];

                const h1y = getHeight(x1);
                const h2y = getHeight(x2);

                const e1 = getInnerEdgeHalf(x1);
                const e2 = getInnerEdgeHalf(x2);

                const h1 = { x: x1, y: h1y, z: e1 * side };
                const h2 = { x: x2, y: h2y, z: e2 * side };

                const o1 = { x: x1, y: topHeight, z: getOuter(x1, h1y, e1) * side };
                const o2 = { x: x2, y: topHeight, z: getOuter(x2, h2y, e2) * side };

                addQuad(h1, h2, o2, o1);
            }
        };

        buildSide(1);
        buildSide(-1);

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geo.computeVertexNormals();

        const mesh = new THREE.Mesh(
            geo,
            new THREE.MeshPhongMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: cfg.opacity,
                side: THREE.DoubleSide
            })
        );

        // --- Add vertical walls along outer edges using the same xs points ---
        const wallVertices = [];

        const pushWall = (p1, p2) => {
            wallVertices.push(
                p1.x, 0, p1.z,
                p1.x, p1.y, p1.z,
                p2.x, 0, p2.z,

                p1.x, p1.y, p1.z,
                p2.x, p2.y, p2.z,
                p2.x, 0, p2.z
            );
        };

        const xs = [startX, blsStartX, iaStartX, endX];
        for (let i = 0; i < xs.length - 1; i++) {
            const x1 = xs[i];
            const x2 = xs[i + 1];

            const h1y = getHeight(x1);
            const h2y = getHeight(x2);

            const e1 = getInnerEdgeHalf(x1);
            const e2 = getInnerEdgeHalf(x2);

            // left (side=1)
            const o1L = { x: x1, y: topHeight, z: getOuter(x1, h1y, e1) };
            const o2L = { x: x2, y: topHeight, z: getOuter(x2, h2y, e2) };
            pushWall(o1L, o2L);
            // right (side=-1)
            const o1R = { x: x1, y: topHeight, z: -getOuter(x1, h1y, e1) };
            const o2R = { x: x2, y: topHeight, z: -getOuter(x2, h2y, e2) };
            pushWall(o2R, o1R);
        }

        // --- Add vertical walls along INNER edges (following IAS + BLS edges) ---
        for (let i = 0; i < xs.length - 1; i++) {
            const x1 = xs[i];
            const x2 = xs[i + 1];

            const h1y = getHeight(x1);
            const h2y = getHeight(x2);

            const e1 = getInnerEdgeHalf(x1);
            const e2 = getInnerEdgeHalf(x2);

            // left inner wall
            const i1L = { x: x1, y: h1y, z: e1 };
            const i2L = { x: x2, y: h2y, z: e2 };
            pushWall(i1L, i2L);

            // right inner wall
            const i1R = { x: x1, y: h1y, z: -e1 };
            const i2R = { x: x2, y: h2y, z: -e2 };
            pushWall(i2R, i1R);
        }

        // --- Add trapezium walls at IAS outer end (closing sides only) ---
        const xEnd = endX;
        const hEnd = getHeight(xEnd);
        const eEnd = getInnerEdgeHalf(xEnd);

        const oEnd = getOuter(xEnd, hEnd, eEnd);

        // LEFT trapezium (IAS side)
        const iEndL = { x: xEnd, y: hEnd, z: eEnd };
        const oEndL = { x: xEnd, y: topHeight, z: oEnd };

        wallVertices.push(
            iEndL.x, 0, iEndL.z,
            iEndL.x, iEndL.y, iEndL.z,
            oEndL.x, 0, oEndL.z,

            iEndL.x, iEndL.y, iEndL.z,
            oEndL.x, oEndL.y, oEndL.z,
            oEndL.x, 0, oEndL.z
        );

        // RIGHT trapezium (IAS side)
        const iEndR = { x: xEnd, y: hEnd, z: -eEnd };
        const oEndR = { x: xEnd, y: topHeight, z: -oEnd };

        wallVertices.push(
            iEndR.x, 0, iEndR.z,
            oEndR.x, 0, oEndR.z,
            iEndR.x, iEndR.y, iEndR.z,

            iEndR.x, iEndR.y, iEndR.z,
            oEndR.x, 0, oEndR.z,
            oEndR.x, oEndR.y, oEndR.z
        );

        const wallGeo = new THREE.BufferGeometry();
        wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVertices, 3));
        wallGeo.computeVertexNormals();

        const wallMesh = new THREE.Mesh(
            wallGeo,
            new THREE.MeshPhongMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: cfg.opacity * 0.7,
                side: THREE.DoubleSide
            })
        );

        // --- Boundary Lines (longitudinal: outer, inner, and bottom inner edges) ---
        const lineMat = new THREE.LineBasicMaterial({
            color: 0xffff00,
            transparent: true,
            opacity: 0.85
        });

        const xsLine = [startX, blsStartX, iaStartX, endX];

        const topOuterL = [];
        const topOuterR = [];
        const bottomInnerL = [];
        const bottomInnerR = [];

        xsLine.forEach(x => {
            const h = getHeight(x);
            const e = getInnerEdgeHalf(x);
            const o = getOuter(x, h, e);

            // LEFT side (positive Z)
            topOuterL.push(new THREE.Vector3(x, topHeight, o));
            bottomInnerL.push(new THREE.Vector3(x, h, e));

            // RIGHT side (negative Z)
            topOuterR.push(new THREE.Vector3(x, topHeight, -o));
            bottomInnerR.push(new THREE.Vector3(x, h, -e));
        });

        const makeLine = (pts) =>
            new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                lineMat
            );

        const lineGroup = new THREE.Group();

        // longitudinal edges
        lineGroup.add(
            makeLine(topOuterL),
            makeLine(topOuterR),
            makeLine(bottomInnerL),
            makeLine(bottomInnerR)
        );

        // --- ADD outer-end boundary lines (vertical closures) ---
        const addEndLine = (x) => {
            const h = getHeight(x);
            const e = getInnerEdgeHalf(x);
            const o = getOuter(x, h, e);

            // LEFT vertical edge
            lineGroup.add(makeLine([
                new THREE.Vector3(x, h, e),
                new THREE.Vector3(x, topHeight, o)
            ]));

            // RIGHT vertical edge
            lineGroup.add(makeLine([
                new THREE.Vector3(x, h, -e),
                new THREE.Vector3(x, topHeight, -o)
            ]));
        };
        // IAS outer end
        addEndLine(endX);
        // BLS far end
        addEndLine(startX);

        return { mesh, wallMesh: new THREE.Group(), line: new THREE.Group(), mesh, wallMesh, line: lineGroup };
    }

    let OLS_REFS = {};

function rebuildSurfaces(skipFit = false) {
      while(olsGroup.children.length > 0){ olsGroup.remove(olsGroup.children[0]); }
      
      OLS_REFS.ihs = generateIHS(currentVScale);
      OLS_REFS.conical = generateConical(currentVScale);
      OLS_REFS.ohs = generateOHS(currentVScale);
      OLS_REFS.trans = generateTransitional(currentVScale);
      
      const t1 = createSingleTakeOff(1, currentVScale);
      OLS_REFS.takeoff1 = t1; olsGroup.add(t1.mesh, t1.wallMesh, t1.line);
      const t2 = createSingleTakeOff(-1, currentVScale);
      OLS_REFS.takeoff2 = t2; olsGroup.add(t2.mesh, t2.wallMesh, t2.line);
      
      const a1 = createSingleApproach(1, currentVScale);
      OLS_REFS.appr1 = a1; olsGroup.add(a1.mesh, a1.wallMesh, a1.line);
      const a2 = createSingleApproach(-1, currentVScale);
      OLS_REFS.appr2 = a2; olsGroup.add(a2.mesh, a2.wallMesh, a2.line);
      
      const ia1 = createSingleInnerApproach(1, currentVScale);
      OLS_REFS.ia1 = ia1; olsGroup.add(ia1.mesh, ia1.wallMesh, ia1.line);
      const ia2 = createSingleInnerApproach(-1, currentVScale);
      OLS_REFS.ia2 = ia2; olsGroup.add(ia2.mesh, ia2.wallMesh, ia2.line);

      const bls1 = createSingleBalkedLanding(1, currentVScale);
      OLS_REFS.bls1 = bls1; olsGroup.add(bls1.mesh, bls1.wallMesh, bls1.line);
      const bls2 = createSingleBalkedLanding(-1, currentVScale);
      OLS_REFS.bls2 = bls2; olsGroup.add(bls2.mesh, bls2.wallMesh, bls2.line);

      const its1 = createITSForRunway(currentVScale);
      const its2 = createITSForRunway27(currentVScale);

      OLS_REFS.its1 = its1;
      OLS_REFS.its2 = its2;

      olsGroup.add(its1.mesh, its1.wallMesh, its1.line);
      olsGroup.add(its2.mesh, its2.wallMesh, its2.line);
      
      applyDepthFix(olsGroup);
      applyAllOpacities();
      updateOLSVisibility();
      if (!skipFit) autoFitCamera();
    }

    function animateCamera(targetPosition, targetLookAt) {
      const duration = 600; // ms
      const start = performance.now();

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      function step(now) {
        const t = Math.min((now - start) / duration, 1);

        // easeInOutCubic
        const ease = t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;

        camera.position.lerpVectors(startPos, targetPosition, ease);
        controls.target.lerpVectors(startTarget, targetLookAt, ease);

        controls.update();

        if (t < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    function autoFitCamera() {
      const box = new THREE.Box3().setFromObject(olsGroup);

      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      const distance = maxDim / (2 * Math.tan(fov / 2));

      const dir = new THREE.Vector3(1, 0.5, 1).normalize();
      const targetPos = center.clone().add(dir.multiplyScalar(distance * 1.5));

      animateCamera(targetPos, center);
    }
