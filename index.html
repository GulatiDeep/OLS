      const p = document.getElementById('layer-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; 
    };

    window.updateOpacity = (surface) => {
      let slider = document.getElementById('op' + surface); if (!slider) return;
      let val = slider.value / 100;
      if (surface === 'IHS') { OLS_REFS.ihs.mesh.material.opacity = val; OLS_REFS.ihs.walls.material.opacity = val; }
      else if (surface === 'Conical') { OLS_REFS.conical.mesh.material.opacity = val; OLS_REFS.conical.walls.material.opacity = val; OLS_REFS.conical.innerWalls.material.opacity = val; }
      else if (surface === 'OHS') { OLS_REFS.ohs.mesh.material.opacity = val; OLS_REFS.ohs.walls.material.opacity = val; }
      else if (surface === 'TakeOff') { OLS_REFS.takeoff1.mesh.material.opacity = val; OLS_REFS.takeoff2.mesh.material.opacity = val; OLS_REFS.takeoff1.wallMesh.material.opacity = val * 0.7; OLS_REFS.takeoff2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'TakeOff2') { OLS_REFS.takeoff2.mesh.material.opacity = val; OLS_REFS.takeoff2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'Appr') { OLS_REFS.appr1.mesh.material.opacity = val; OLS_REFS.appr2.mesh.material.opacity = val; OLS_REFS.appr1.wallMesh.material.opacity = val * 0.7; OLS_REFS.appr2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'Appr2') { OLS_REFS.appr2.mesh.material.opacity = val; OLS_REFS.appr2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'InnerAppr') { OLS_REFS.ia1.mesh.material.opacity = val; OLS_REFS.ia2.mesh.material.opacity = val; OLS_REFS.ia1.wallMesh.material.opacity = val * 0.7; OLS_REFS.ia2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'InnerAppr2') { OLS_REFS.ia2.mesh.material.opacity = val; OLS_REFS.ia2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'BLS') { OLS_REFS.bls1.mesh.material.opacity = val; OLS_REFS.bls2.mesh.material.opacity = val; OLS_REFS.bls1.wallMesh.material.opacity = val * 0.7; OLS_REFS.bls2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'BLS2') { OLS_REFS.bls2.mesh.material.opacity = val; OLS_REFS.bls2.wallMesh.material.opacity = val * 0.7; }
      else if (surface === 'Trans') { [OLS_REFS.trans.g09, OLS_REFS.trans.g27, OLS_REFS.trans.gCentral].forEach(g => { if(g){ g.children[0].material.opacity = val; g.children[1].material.opacity = val * 0.7; }}); }
      else if (surface === 'Trans27') {
        OLS_REFS.trans.g27.children[0].material.opacity = val;
        OLS_REFS.trans.g27.children[1].material.opacity = val * 0.7;
      }
      else if (surface === 'ITS') {
        [OLS_REFS.its1, OLS_REFS.its2].forEach(its => {
          its.mesh.material.opacity = val;
        });
      }
      else if (surface === 'ITS2') {
        OLS_REFS.its2.mesh.material.opacity = val;
      }
      const label = document.getElementById('val' + surface); if (label) label.innerText = Math.round(val * 100) + '%';
    };

    function applyAllOpacities() {
      const surfaces = [
        'IHS','Conical','OHS',
        'TakeOff','TakeOff2',
        'Appr','Appr2',
        'InnerAppr','InnerAppr2',
        'BLS','BLS2',
        'Trans','Trans27',
        'ITS','ITS2'
      ];

      surfaces.forEach(s => {
        const slider = document.getElementById('op' + s);
        if (slider) updateOpacity(s);
      });
    }

    window.cycleVScale = () => {
      currentVScale++; if (currentVScale > 10) currentVScale = 1;
      document.getElementById('zoom-value-text').innerText = currentVScale + 'x';
      rebuildSurfaces(true);
    };

    window.updateOLSVisibility = () => {
      const getV = id => {
        const el = document.getElementById(id);
        return el ? el.checked : false;
      };
      const setSliderState = (chkId, sliderId) => {
        const chk = document.getElementById(chkId);
        const slider = document.getElementById(sliderId);
        if (slider) slider.disabled = !chk.checked;
      };
      [OLS_REFS.ihs.mesh, OLS_REFS.ihs.walls, OLS_REFS.ihs.lines].forEach(m => m.visible = getV('chkIHS'));
      setSliderState('chkIHS','opIHS');
      [OLS_REFS.conical.mesh, OLS_REFS.conical.walls, OLS_REFS.conical.innerWalls, OLS_REFS.conical.lines].forEach(m => m.visible = getV('chkConical'));
      setSliderState('chkConical','opConical');
      [OLS_REFS.ohs.mesh, OLS_REFS.ohs.walls, OLS_REFS.ohs.lines].forEach(m => m.visible = getV('chkOHS'));
      setSliderState('chkOHS','opOHS');
      [OLS_REFS.takeoff1.mesh, OLS_REFS.takeoff1.wallMesh, OLS_REFS.takeoff1.line].forEach(m => m.visible = getV('chkTakeOff1'));
      setSliderState('chkTakeOff1','opTakeOff');
      [OLS_REFS.takeoff2.mesh, OLS_REFS.takeoff2.wallMesh, OLS_REFS.takeoff2.line].forEach(m => m.visible = getV('chkTakeOff2'));
      setSliderState('chkTakeOff2','opTakeOff2');
      [OLS_REFS.appr1.mesh, OLS_REFS.appr1.wallMesh, OLS_REFS.appr1.line].forEach(m => m.visible = getV('chkAppr1'));
      setSliderState('chkAppr1','opAppr');
      [OLS_REFS.appr2.mesh, OLS_REFS.appr2.wallMesh, OLS_REFS.appr2.line].forEach(m => m.visible = getV('chkAppr2'));
      setSliderState('chkAppr2','opAppr2');
      [OLS_REFS.ia1.mesh, OLS_REFS.ia1.wallMesh, OLS_REFS.ia1.line].forEach(m => m.visible = getV('chkInnerAppr1'));
      setSliderState('chkInnerAppr1','opInnerAppr');
      [OLS_REFS.ia2.mesh, OLS_REFS.ia2.wallMesh, OLS_REFS.ia2.line].forEach(m => m.visible = getV('chkInnerAppr2'));
      setSliderState('chkInnerAppr2','opInnerAppr2');
      [OLS_REFS.bls1.mesh, OLS_REFS.bls1.wallMesh, OLS_REFS.bls1.line].forEach(m => m.visible = getV('chkBLS1'));
      setSliderState('chkBLS1','opBLS');
      [OLS_REFS.bls2.mesh, OLS_REFS.bls2.wallMesh, OLS_REFS.bls2.line].forEach(m => m.visible = getV('chkBLS2'));
      setSliderState('chkBLS2','opBLS2');
      [OLS_REFS.its1.mesh, OLS_REFS.its1.wallMesh, OLS_REFS.its1.line]
        .forEach(m => m.visible = getV('chkITS1'));
      setSliderState('chkITS1','opITS');
      [OLS_REFS.its2.mesh, OLS_REFS.its2.wallMesh, OLS_REFS.its2.line]
        .forEach(m => m.visible = getV('chkITS2'));
      setSliderState('chkITS2','opITS2');
      OLS_REFS.trans.g09.visible = getV('chkTrans09'); 
      setSliderState('chkTrans09','opTrans');
      OLS_REFS.trans.g27.visible = getV('chkTrans27');
      setSliderState('chkTrans27','opTrans27');
      OLS_REFS.trans.gCentral.visible = getV('chkTrans09') || getV('chkTrans27');
      updateRunwayGroupState('09');
      updateRunwayGroupState('27');
      updateCommonGroupState();
      updateOFZGroupState('09');
      updateOFZGroupState('27');
    };

    function updateRunwayGroupState(rwy) {
      const is09 = rwy === '09';
      const parent = document.getElementById(is09 ? 'chkRwy09' : 'chkRwy27');

      const ids = is09
        ? ['chkTrans09','chkITS1','chkTakeOff1','chkAppr1','chkInnerAppr1','chkBLS1']
        : ['chkTrans27','chkITS2','chkTakeOff2','chkAppr2','chkInnerAppr2','chkBLS2'];

      const states = ids.map(id => document.getElementById(id).checked);

      const allChecked = states.every(v => v);
      const anyChecked = states.some(v => v);

      parent.checked = allChecked;
      parent.indeterminate = !allChecked && anyChecked;
    }

    function updateCommonGroupState() {
      const parent = document.getElementById('chkCommon');
      const ids = ['chkIHS','chkConical','chkOHS'];

      const states = ids.map(id => document.getElementById(id).checked);

      const allChecked = states.every(v => v);
      const anyChecked = states.some(v => v);

      parent.checked = allChecked;
      parent.indeterminate = !allChecked && anyChecked;
    }

    function updateOFZGroupState(rwy) {
      const is09 = rwy === '09';
      const parent = document.getElementById(is09 ? 'chkOFZ09' : 'chkOFZ27');

      const ids = is09
        ? ['chkInnerAppr1','chkBLS1','chkITS1']
        : ['chkInnerAppr2','chkBLS2','chkITS2'];

      const states = ids.map(id => document.getElementById(id).checked);

      const allChecked = states.every(v => v);
      const anyChecked = states.some(v => v);

      parent.checked = allChecked;
      parent.indeterminate = !allChecked && anyChecked;
    }

    window.toggleRunwayGroup = (rwy) => {
      const is09 = rwy === '09';
      const master = document.getElementById(is09 ? 'chkRwy09' : 'chkRwy27').checked;

      const ids = is09
        ? ['chkTrans09','chkITS1','chkTakeOff1','chkAppr1','chkInnerAppr1','chkBLS1']
        : ['chkTrans27','chkITS2','chkTakeOff2','chkAppr2','chkInnerAppr2','chkBLS2'];

      ids.forEach(id => {
        document.getElementById(id).checked = master;
      });

      updateOLSVisibility();
    };

    function resetAllControls() {
      // Reset zoom level to default (4x)
      currentVScale = 4;
      const zoomLabel = document.getElementById('zoom-value-text');
      if (zoomLabel) zoomLabel.innerText = '4x';
      // Set default slider values and labels
      const defaultOpacity = {
        IHS:20, Conical:40, OHS:20,
        Appr:40, Appr2:40,
        TakeOff:60, TakeOff2:60,
        Trans:80, Trans27:80,
        InnerAppr:40, InnerAppr2:40,
        BLS:60, BLS2:60,
        ITS:60, ITS2:60
      };
      Object.keys(defaultOpacity).forEach(key => {
        const slider = document.getElementById('op' + key);
        const label = document.getElementById('val' + key);
        if (slider) slider.value = defaultOpacity[key];
        if (label) label.innerText = defaultOpacity[key] + '%';
      });

      const checkboxes = document.querySelectorAll('#layer-panel input[type="checkbox"]');
      checkboxes.forEach(chk => chk.checked = true);

      applyAllOpacities();
      rebuildSurfaces();
      updateOLSVisibility();

      // Collapse all groups and reset icons consistently
      const groups = ['commonGroup','rwy09Group','rwy27Group','ofz09','ofz27'];

      groups.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });

      // Reset all +/- icons strictly based on collapsed state
      document.querySelectorAll('.toggle-row span').forEach(icon => {
        icon.innerText = '+';
      });

      updateRunwayGroupState('09');
      updateRunwayGroupState('27');
      updateCommonGroupState();
      updateOFZGroupState('09');
      updateOFZGroupState('27');
      autoFitCamera();
    }

    createBaseline();
    rebuildSurfaces();
    autoFitCamera();
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, 150);
    });
    function animate() {
      requestAnimationFrame(animate);
      if (controls.enabled) controls.update();
      if (compassArrow && controls) {
        const angle = controls.getAzimuthalAngle();
        compassArrow.style.transform = `rotate(${-angle}rad)`;
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
  <script>
  // Collapsible section toggler (legacy, but still present for any old calls)
  window.toggleSection = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
  };

  // New: Collapsible section toggler with +/− icon on right
  window.toggleSectionWithIcon = (id, el, event) => {
    if (!event) return;

    const target = event.target;

    // If checkbox clicked → do nothing here (handled separately)
    if (target.tagName === 'INPUT') return;

    // If label text clicked → prevent checkbox toggle
    if (target.closest('label')) {
      event.preventDefault();
    }

    const section = document.getElementById(id);
    if (!section) return;

    const isHidden = section.style.display === 'none' || section.style.display === '';
    section.style.display = isHidden ? 'block' : 'none';

    if (el) el.innerText = isHidden ? '−' : '+';
  };

  // New: Toggle all Common Surfaces from group checkbox
  window.toggleCommonGroup = () => {
    const master = document.getElementById('chkCommon').checked;
    ['chkIHS','chkConical','chkOHS'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.checked = master;
    });
    updateOLSVisibility();
  };

  // New: Toggle all OFZ surfaces for a runway from group checkbox
  window.toggleOFZGroup = (rwy) => {
    const is09 = rwy === '09';
    const master = document.getElementById(is09 ? 'chkOFZ09' : 'chkOFZ27').checked;

    const ids = is09
      ? ['chkInnerAppr1','chkBLS1','chkITS1']
      : ['chkInnerAppr2','chkBLS2','chkITS2'];

    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.checked = master;
    });

    updateOLSVisibility();
  };

  // Close layer panel when clicking outside
document.addEventListener('pointerdown', function(e) {
  const panel = document.getElementById('layer-panel');
  const btn = document.getElementById('layer-toggle-btn');

  if (!panel || !btn) return;

  const isClickInside = panel.contains(e.target) || btn.contains(e.target);

  if (!isClickInside) {
    panel.style.display = 'none';
  }
});
